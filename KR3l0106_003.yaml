body:
  text: 杜陽雜編卷下唐蘇鶚撰武宗皇帝會昌元年夫餘國夫餘國見漢東夷傳貢火玉三斗及松風石火玉色赤長半寸上尖下圓光照數十步積之可以燃鼎置之室內則不復挾纊才人常用煎澄明酒其酒亦異方所貢也色紫如膏飲之令人骨香松風石方一丈瑩徹如玉其中有樹形若古松偃蓋颯颯焉而涼飈生於其間至盛夏上令置諸殿內稍秋風颼颼即令撤去上好神􅋖術遂起望􅋖臺以崇朝禮復修降真臺舂百寶屑以塗其地瑤楹金栱銀檻玉砌晶熒炫耀看之不定內設玳瑁帳火齊牀焚龍火香薦無憂酒此皆他國所獻也亡其國名上每齋戒沐浴召道士趙歸真已下共探希夷之理由是室內生靈芝二株皆如紅玉又渤海貢馬腦匱紫瓷盆馬腦匱方三尺深色如茜所製工巧無比用貯神􅋖之書置之帳側紫瓷盆量容半斛內外通瑩其色純紫厚可寸餘舉之則若鴻毛上嘉其光潔遂處於􅋖臺祕府以和藥餌後王才人擲玉環誤缺其半菽上猶歎息久之傳於濮州刺史楊坦處士元藏幾自言是後魏清河孝王之孫也隋煬帝時官奉信郎大業元年為過海使判官遇風浪壞船黑霧四合同濟者皆不救而藏幾獨為破木所載殆經半月忽達於洲島間洲人問其從來藏幾具以事對洲人曰此乃滄浪洲去中國已數萬里乃出菖蒲酒桃花酒飲之而神氣清爽焉其洲方千里花木常如二三月地土宜五榖人多不死亦出鳳凰孔雀靈牛神馬之屬又産分蒂瓜瓜長二尺其色如椹一顆二蒂有碧棗丹栗皆大如梨其洲人多衣縫掖衣戴逺遊冠與之語中華事則歷歷如在目前所居或金闕銀臺玉樓紫閣奏簫韶之樂飲香霧之醑洲上有久視山山下出澄緑水其泉濶一百步亦謂之流緑渠雖投之金石終不沉沒故洲人以瓦鐵為船舫又有良金池可方數十里水石沙泥皆如金色其中有四足魚今刑部盧潯員外云金義嶺有池如盆其中有魚皆四足又有金蓮花洲人研之如泥以間綵繪光影煥爍與真金無異但不能入火而已更有金莖花其花如蝶每微風至則搖蕩如飛婦人競採之以為首飾且有語曰不戴金莖花不得在􅋖家又有強木造舟楫其上多飾珠玉以為遊戲強木不沉木也方一寸重百斤巨石縋之終不能沒藏幾淹駐既久忽思中國洲人遂製凌風舸以送之激水如箭不旬日即達于東萊問其國乃皇唐也詢年號則貞元也訪鄉里則榛蕪也追子孫皆疏屬也自隋大業元年至貞元末殆二百年矣有二鳥大小類黃鸝每翔翥空中藏幾呼之則至或令銜珠或令授人語乃謂之傳信鳥本出滄浪洲也藏幾工詩好酒混俗無拘撿數十年間遍遊無定人莫知之惟趙歸真常與藏幾弟子九華道士葉通微相遇遂得其實歸真往往以藏幾之異備奏于上上令謁者賫手詔急徴及至中路忽然亡去謁者惶怖即上疏具言其故上覽疏咨嗟曰朕不能如明皇帝以降異人後有人見藏幾泛小舟於海上者至今江表道流大傳其事焉宣宗皇帝英明儉德器識髙逺比在藩邸常為諸王典式忽一日不豫神光滿身南面獨語如對百寮鄭太后惶恐慮左右有以此事告者遂奏文宗云上心疾文宗召見熟視上貌以玉精如意撫䏶曰此真我家他日英主豈曰心疾乎即賜上御馬金帶仍令選良家子以納上宅及即位時人比漢文帝衣浣濯之衣饌不兼味先是宫中每欲行幸即先以龍腦鬱金藉其地自上垂拱並不許焉凡與朝士從容未嘗一日不論儒學而頗注意於貢舉常於殿柱上題鄉貢進士字或大臣出鎮即賦詩賜之凡欲對公卿百寮必先嚴整容止更衣盥手然後方出語及庶政則終日忘倦章奏有不欲左右見者率皆焚爇倡優妓樂或彌日嬉戲上未嘗等間破顏縱賜與亦甚寡薄一日後宫有疾召醫人侍湯藥洎平愈上袖出金數兩遺之醫者將謝遽止之曰勿使內官知言出於外更使諫官上疏也其儉靜率多此類大中初女蠻國貢雙龍犀有二龍鱗鬛爪角悉備明霞錦云鍊水香麻以為之也光耀芬馥著人五色相間而美麗於中國之錦其國人危髻金冠瓔珞被體故謂之菩薩蠻當時倡優遂製菩薩蠻曲文士亦往往聲其詞更有女王國貢龍油綾魚油錦文彩尤異皆入水不濡濕云有龍油魚油故也優者亦作女王國曲音調宛暢傳於樂部後漢東夷傳云海中有女王國視井即有孕又梁朝公子傳云女國有六大中中日本國王子來朝獻寶器音樂上設百戲珍饌以禮焉王子善圍棋上敕顧師言待詔為對手王子出楸玉局冷暖玉棋子云本國之東三萬里有集真島島上有凝霞臺臺上有手談池池中産玉棋子不由製度自然黑白分焉冬溫夏冷故謂之冷暖玉又産如楸玉狀類楸木琢之為棋局光潔可鑒及師言與之敵手至三十三下勝負未決師言懼辱君命而汗手凝思方敢落指則謂之鎮神頭乃是解兩征勢也王子瞪目縮臂已伏不勝回語鴻臚曰待詔第幾手耶鴻臚詭對曰第三手也師言實第一國手矣王子曰願見第一曰王子勝第三方得見第二勝第二方得見第一今欲躁見第一其可得乎王子掩局而吁曰小國之一不如大國之三信矣今好事者尚有顧師言三十三鎮神頭圖羅浮先生軒轅集年過數百而顏色不老立於牀前則髮垂至地坐於暗室則目光可長數丈每採藥於深巖峻谷則有毒龍猛獸往來衛護或晏然居家人有具齋邀之雖一日百處無不分身而至或與人飲酒則袖出一壺才容一二升縱客滿座而傾之彌日不竭或他人命飲即百斗不醉夜則垂髮於盆中其酒瀝瀝而出麴糵之香輒無減耗或與獵人同羣有非朋遊者俄而見十數人儀貌無不間别或飛朱篆於空中則可屆千里有病者以布巾拭之無不應手而愈及上召入內庭遇之甚厚每與從容論道率皆叶於上意因問曰長生之道可致乎集曰撤聲色去滋味哀樂如一德施無偏自然與天地合德日月齊明則致堯舜禹湯之道而長生久視之術何足難哉又問先生之道孰愈於張果曰臣不知其他但少於果耳及退上遣嬪御取金盆覆白鵲以試之集方休於所舍忽起謂中貴人曰皇帝安能更令老夫射覆盆乎中貴人皆不喻其言于時上召令速至而集才及玉階謂上曰盆下白鵲宜早放之上笑曰先生早已知矣坐於御榻前上令宫人侍茶湯有笑集貌古布素者而縝髮絳脣年才二八須臾忽變成老嫗雞皮鮐背髮鬢皤然宫人悲駭於上前流涕不已上知宫人之過促令謝告先生而容質却復如故上因語京師無豆􅛌荔枝花俄頃二花皆連枝葉各數百鮮明芳潔如才折下又嘗賜甘子集曰臣山下有味逾於此者上曰朕無復得之集遂取上前碧玉甌以寶盤覆之俄頃撤盤即甘子至矣芬馥滿殿其狀甚大上食之嘆其甘美無匹又問曰朕得幾年天子即把筆書曰四十年但十字挑腳上笑曰朕安敢望四十年乎及晏駕乃十四年也集初辭上歸山自長安至江陵於一布囊中探金錢以施貧者約數十萬中使從之莫知其所出既至中路忽亡其所在使臣惶恐不自安後數日南海奏先生歸羅浮山矣大中末舒州奏衆鳥成巢濶七尺髙一丈而燕雀鷹鸇水禽山鳥無不親狎如一又有鳥人面緑毛觜爪悉紺其聲曰甘蟲因謂之曰甘蟲時人畫圖鬻於市肆焉懿宗皇帝器度沉厚形貌瓌偉在藩邸時疾疹方甚而郭淑妃見黃龍出入于卧內上疾稍間妃異之具以事聞上曰無泄是言貴不見忘又嘗大雪盈尺上寢室上輒無分寸諸王見者無不異之大中末京城小兒疉布蘸水向日張之謂捩暈及上自鄆王即位捩暈之言應矣宣宗製泰邊陲曲其詞曰海嶽晏咸通及上垂拱而年號咸通焉上仁孝之道出於天性鄭太后厭代而蔬素悲咽同士人之禮公卿奉慰者無不動容以至酸鼻咸通九年同昌公主出降宅于廣化里賜錢五百萬貫仍罄內庫寶貨以實其宅至于房櫳户牖無不以珍異飾之又以金銀為井欄藥臼食匱水槽釜鐺盆甕之屬仍鏤金為笊籬箕筐製水精火齊琉璃玳瑁等牀悉搘以金龜銀螯又琢五色玉器為什合百寶為圓案又賜金麥銀米共數斛此皆太宗廟條支國所獻也堂中設連珠之帳却寒之簾犀簟牙席龍罽鳳褥連珠帳續真珠為之也却寒簾類玳瑁斑有紫色云却寒之鳥骨所為也未知出自何國又有鷓鴣枕翡翠匣神絲繡被其枕以七寶合成為鷓鴣之狀翡翠匣積毛羽飾之神絲繡被繡三千鴛鴦仍間以奇花異葉其精巧華麗絶比其上綴以靈粟之珠珠如粟粒五色輝煥又帶蠲忿犀如意玉其犀圓如彈丸入土不朽爛帶之令人蠲忿怒如意玉類桃實上有七孔云通明之象也又有瑟瑟幕紋布巾火蠶綿九玊叉其幕色如瑟瑟濶三丈長一百尺輕明虛薄無以為比向空張之則疏朗之紋如碧絲之貫真珠雖大雨暴降不能濕溺云以鮫人瑞香膏傅之故也紋布巾即手巾也潔白如雪光軟特異拭水不濡用之彌年不生垢膩二物稱得之鬼谷國火蠶綿云出炎洲絮衣一襲用一兩稍過度則熇蒸之氣不可近也九玉叉上刻九鸞皆九色上有字曰玉兒工巧妙麗殆非人工所製有金陵得者以獻公主酬之甚厚一日晝寢夢絳衣奴授語云南齊潘淑妃取九鸞叉及覺具以夢中之言言於左右洎公主薨其叉亦亡其處韋氏異其事遂以實話於門人或有云玉兒即潘妃小字也逮諸珍異不可具載自兩漢至皇唐公主出降之盛未之有也公主乘七寶步輦四面綴五色香囊囊中貯辟寒香辟邪香瑞麟香金鳳香此香異國所獻也仍雜以龍腦金屑刻鏤水精馬腦辟塵犀為龍鳳花其上仍絡以真珠玳瑁又金絲為流蘇雕輕玉為浮動每一出遊則芬馥滿路晶熒照灼觀者眩惑其目是時中貴人買酒於廣化旗亭忽相謂曰坐來香氣何太異也同席曰豈非龍腦耶曰非也余幼給事於嬪御宫故常聞此未知今日由何而致因顧問當壚者遂云公主步輦夫以錦衣換酒於此也中貴人共視之益歎其異上每賜御饌湯物而道路之使相屬其饌有靈消炙紅虬脯其酒有凝露漿桂花醑其茶則緑華紫英之號靈消炙一羊之肉取之四兩雖經暑毒終不見敗紅虬脯非虬也但貯於盤中則健如虬紅絲髙一尺以筯抑之無數分撤則復其故逮諸品味人莫能識而公主家饜飫如里中粳粃一日大會韋氏之族於廣化里玉饌俱列暑氣將甚公主命取澄水帛以水蘸之挂於南軒良久滿座皆思挾纊澄水帛長八九尺似布而細明薄可鑒云其中有龍涎故能消暑毒也韋氏諸家好為葉子戲夜則公主以紅琉璃盤盛夜光珠令僧祁捧立堂中而光明如晝焉公主始有疾召術士米賨為燈法乃以香蠟燭遺之米氏之鄰人覺香氣異常或詣門詰其故賨具以事對其燭方二寸上被五色文卷而爇之竟夕不盡郁烈之氣可聞於百步餘煙出其上即成樓閣臺殿之狀或云蠟中有蜃脂故也公主疾既甚醫者欲難其藥餌奏云得紅蜜白猿膏食之可愈上令訪內庫得紅蜜數石本兜離國所貢也白猿脂數甕本南海所獻也山海經曰南方有山中多白猿雖日加餌一無其驗而公主薨上哀痛之自製挽歌詞令百官繼和及庭祭日百司與內官皆用金玉飾車輿服玩以焚於韋氏之庭家人爭取其灰以擇金寶及葬於東郊上與淑妃御延興門出內庫金玉駝馬鳳凰麒麟各髙數尺以為威儀其衣服玩具悉與生人無異一物已上皆至一百二十舁刻木為樓閣宫殿龍鳳花木人畜之象者不可勝計以絳羅多繡絡金銀瑟瑟為帳幕者亦各千隊結為幢節傘蓋彌街翳日旌旗珂珮兵士鹵簿率多加等以賜紫尼及女道士為侍從引翼焚升霄降靈之香擊歸天紫金之磬繁華輝煥殆二十餘里上賜酒一百斛餅餤三十駱駝各徑濶二尺飼役夫也京城士庶罷市奔看汗流相屬惟恐居後及靈車過延興門上與淑妃慟哭中外聞者無不傷泣同日葬乳母上又作祭乳母文詞理悲切人多傳寫是後上晨夕惴心挂想李可及進歎百年曲聲詞怨感聽之莫不淚下又教數千人作歎百年隊取內庫珍寶雕成首飾畫八百匹官絁作魚龍波浪文以為地衣每一舞而珠翠滿地可及官歷大將軍賞賜盈萬甚無狀左軍容使西門季玄素鯁直乃謂可及曰爾恣巧媚以惑天子滅族無日矣可及恃寵亦無改作可及善轉喉舌對至尊弄媚眼作頭腦連聲作詞唱新聲曲須臾即百數方休時京城不調少年相效謂之拍彈去聲一日可及乞假為子娶婦上曰即令送酒米以助汝嘉禮可及至舍見一中使監二銀榼各髙二尺餘宣賜可及始謂之酒及封啓皆實中也上賜可及金麒麟髙數尺可及取官車載歸私第西門季玄曰今日受賜更用官車他日破家亦須輦還內府不道受賞徒勞牛足後可及坐流嶺南其舊賜珍玩悉皆進納君子謂西門有先見之明上敬天竺教十二年冬製二髙座賜新安國寺一為講座一曰唱經座各髙二丈砑沉檀為骨以漆塗之鏤金銀為龍鳳花木之形遍覆其上又置小方座前陳經案次設香盆四隅立金頴伽髙三丈磴道欄檻無不悉具前繡錦襜褥精巧奇絶冠于一時即設萬人齋敕大德僧撤首為講論上創修安國寺臺殿廊宇制度宏麗就中三間華飾祕邃天下稱之為最工人以夜繼日而成之上親幸賞勞觀者如堵降誕日於宫中結綵為寺賜升朝官已下錦袍李可及嘗教數百人作四方菩薩蠻隊十四年春詔大德僧數十輩於鳳翔法門寺迎佛骨百官上疏諫有言憲宗故事者上曰但生得見歿而無恨也遂以金銀為寶剎以珠玉為寶帳香舁仍用孔雀氄毛飾其寶剎小者髙一丈大者二丈刻香檀為飛簾花檻瓦木階砌之類其上遍以金銀覆之舁一剎則用夫數百其寶帳香舁不可勝紀工巧輝煥與日爭麗又悉珊瑚馬瑙真珠瑟瑟綴為幡幢計用珍寶不啻百斛其剪綵為幡為傘約以萬隊四月八日佛骨入長安自開逺門安福樓夾道佛聲振地士女瞻禮僧徒道從上御安福寺親自頂禮泣下霑臆即召兩街供奉僧賜金帛各有差仍京師耆老元和迎真體者悉賜銀碗錦綵長安豪家競飾車服駕肩彌路四方挈老扶幼來觀者莫不蔬素以待恩福時有軍卒斷左臂於佛前以手執之一步一禮血流灑地至於肘行膝步齧指截髮不可算數又有僧以艾覆頂上謂之鍊頂火發痛作即掉其首呼叫坊市少年擒之不令動搖而痛不可忍乃號哭卧於道上頭頂焦爛舉止蒼迫凡見者無不大哂焉上迎佛骨入內道場即設金花帳溫清牀龍鱗之席鳳毛之褥焚玉髓之香薦瓊膏之乳皆九年訶陵國所貢獻也初迎佛骨有詔令京城及畿甸於路傍壘土為香剎或髙一二丈逮八九尺悉以金翠飾之京城之內約及萬數是妖言香剎搖動有佛光慶雲現路衢説者迭相為異又坊市豪家相為無遮齋大會通衢間結綵為樓閣臺殿或水銀以為池金玉以為樹競聚僧徒廣設佛像吹螺擊鈸燈燭相繼又令小兒玉帶金額白腳呵唱於其間恣為嬉戲又結錦繡為小車輿以載歌舞如是充於輦轂之下而延夀里推為繁華之最是歲秋七月天子晏駕識者以為物極為妖公主薨而上崩同昌之號明矣僖宗皇帝即位詔歸佛骨于法門其道從威儀十無其一具體而已然京城耆耋士女爭為送别執手相謂曰六十年一度迎真身不知再見復在何時即伏首於前嗚咽流涕所在香剎詔悉鏟除近甸百無一二焉杜陽雜編卷下
