body:
  text: 杜陽雜編小説家類二異聞之屬提要臣等謹案杜陽雜編三卷唐蘇鶚撰鶚有演義已著録此編所記上起代宗廣德元年下盡懿宗咸通十四年凡十朝之事皆以三字為標目其中述竒技寶物類涉不經大抵祖述王嘉之拾遺郭子橫之洞冥雖必舉所聞之人以實之殆亦俗語之為丹青也所稱某物為某年某國所貢者如日林大林文單吳明拘弭大軫南昌浙東條支鬼谷訶陵兜離唐書外國傳皆無此名諸帝本紀亦無其事即如夫餘國久併於渤海大氏而云武宗會昌元年夫餘來貢罽賓地接蔥嶺漢書唐書均有明文而云在西海尤舛忤之顯然者矣然鋪陳縟艷詞賦恆所取材固小説家之以文采勝者讀者挹其葩蘂遂亦忘其夸飾至今沿用殆以是歟其曰杜陽雜編者朝公武讀書志謂鶚居武功之杜陽蓋因地以名其書云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:7863418e66d2cc708034a271f253e66d27f8b859a4420586a91c524cf83e20db
