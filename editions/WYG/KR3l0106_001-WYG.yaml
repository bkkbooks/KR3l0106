body:
  text: 杜陽雜編卷上唐蘇鶚撰代宗廣德元年吐畨犯便橋上幸陜王師不利常有紫氣如車蓋以迎馬首及廻潼關上嘆曰河水洋洋送朕東去上至陜因望鐵牛蹶然謂左右曰朕年十五六宫中有尼號功德山言事往往神驗屢撫吾背曰天下有災遇牛方廻今見牛也朕將廻爾是夜夢黄衣童子歌於帳前曰中五之德方峩峩胡呼胡呼可奈何詰且上具言其夢侍臣咸稱土德當王吐蕃破滅之兆也黄衣土之色中五土之數峩峩者髙盛之義也是月副元帥郭子儀與大將李忠義渭北節度使王仲昇克復京都吐蕃大潰上還宫闕圖功臣於凌烟閣上因謂子儀曰安禄山僭亂中原是卿再安皇祚昨朕蒙塵卿復戮力今日天下乃卿與我也雖圖劵不足以褒元老因泣下霑衣子儀伏於上前嗚咽流涕曰老臣無復致命久矣但慮衰耄不堪王事賴仗陛下宗廟社稷之靈以成㣲績上因命御馬九花虬幷紫玉鞭轡以賜子儀知九花之異固陳讓者久之上曰此馬髙大稱卿儀質不必讓也子儀身長六尺餘九花虬即范陽節度李德山所貢額髙九寸毛拳如麟頭頸鬃鬛真虬龍也每一嘶則羣馬聳耳以身被九花文故號為九花虬亦有師子驄皆其𩔖上東幸觀獵於田不覺日暮忽顧謂左右曰行宫去此幾里奏曰四十里上遂令速鞭恐閡夜而九花虬緩緩然若行五里而已侍從奔驟無及者上以為超光趍影之匹也王子年拾遺記周穆王有八駿號超光趍影逐日者自是益加鍾愛既復京師特賜子儀崇功臣也上嘗幸興慶宫於復壁間得寶匣匣中獲玉鞭鞭末有文曰軟玉鞭即天寶中異國所獻光可鑑物節文端妍雖藍田之美不能過也屈之則頭尾相就舒之則勁直如繩雖以斧鑕鍛斫終不傷缺上嘆為異物遂命聯蟬繡為囊碧玉絲為鞘碧玉􅁞絲即永泰元年東海彌羅國所貢云其國有桑枝幹盤屈覆地而生大者連延十數頃小者蔭百畝其上有􅁞可長四寸其色金其絲碧亦謂之金􅁞絲縱之一尺引之一丈撚而為鞘表裏通瑩如貫瑟瑟雖併十夫之力挽之不斷為琴瑟絃則鬼神悲愁忭舞為弩絃則箭出一千步為弓絃則箭出五百步上令藏之於内府至朱泚犯禁闈其鞭不知所在故水部賈嵩員外所傳也上寛厚之德出於天然為兒時常為𤣥宗器之每坐於玉案前熟視上貌謂武惠妃曰此兒甚有異相他日亦是吾家一有福天子也因命取上清珠以絳紗裹之繋於頸上上清珠即開元初􅄢賓國所貢􅄢賓國在西海其珠光明潔白可照一室視之則出􅋖人玉女雲鶴絳節之象搖動於其中及上即位寶庫中往往有神光異氣掌庫者具以事告上曰豈非上清珠耶遂令出之絳紗猶在乃泫然流涕徧示近臣曰此我為兒時明皇所賜也遂令貯之於翠玉函置之于卧内忽有水旱兵革之災上每䖍祝之無不應驗大厯中日林國獻靈光豆龍角釵其國在海東北四萬里國西南有恠石方數百里光明澄澈可鑑人五藏六腑亦謂之僊人鏡其國人有疾輙照其形遂知起於某藏腑即自採神草餌之無不愈焉靈光豆大小𩔖中國之菉豆其色殷紅而光芒長數尺本國人亦呼為詰多珠和石上菖蒲葉煮之即大如鵝卵其中純紫秤之可重一觔上㗖一丸香美無比而數日不復言飢渇龍角釵𩔖玉而紺色上刻蛟龍之形精巧奇麗非人所製上因賜獨孤妃與上同遊龍舟池有紫雲自釵上而生俄頃滿于舟楫上命置之掌内以水噴之遂化為二龍騰空東去上崇奉釋氏每春百品香和銀粉以塗佛室遇新羅國獻五彩氍毹製度巧麗亦冠絶一時每方寸之内即有歌舞􅇊樂列國山川之象忽㣲風入室其上復有蜂蝶動搖燕雀飛舞俯而視之莫辨真假又獻萬佛山可髙一丈因置山於佛室以氍毹藉其地焉萬佛山則彫沉檀珠玉以成之其佛之形大者或逾寸小者七八分其佛之首有如黍米者有如半菽者其眉目口耳螺髻毫相無不悉具而更鏤金玉水晶為幡蓋流蘇菴羅薝蔔等樹搆百珤為樓閣臺殿其狀雖㣲而勢若飛動又前有行道僧徒不啻千數下有紫金鐘徑濶三寸上以龜口衘之每撃其鐘則行道之僧禮首至地其中𨼆𨼆謂之梵音蓋關戾在乎鐘也其山雖以萬佛為名其數則不可勝紀上因置九光扇於巖巘間四月八日召雨衆僧徒入内道塲禮萬佛山是時觀者歎非人工及覩九色光於殿中咸謂之佛光即九光扇也由是上令三藏僧不空念天竺密語千口而退傳之於僧惟籍李輔國恣横無君上切齒久矣因寢夢登樓見髙力士領兵數百鐵騎以㦸刺輔國首流血灑地前後歌呼自北而去遣謁者問其故力士曰明皇之令也上覺亦不敢言輔國尋為盜所殺上異之方以夢話於左右先是肅宗賜輔國香玉辟邪二各髙一尺五寸奇巧殆非人間所有其玉之香可聞於數百步雖鎖之於金函石匱終不能掩其氣或以衣裾誤拂則芬馥經年縱澣濯數四亦不消歇輔國常置於坐側一日方巾櫛而辟邪忽一大笑一悲號輔國驚愕失據而囅然者不已悲號者更涕泗交下輔國惡其怪碎之如粉以投厠中其後常聞寃痛之聲其輔國所居里巷酷烈彌月猶在蓋舂之為粉而愈香故也不周歲而輔國死焉初碎辟邪輔國嬖拏慕容宫人知異常物𨼆屑二合而魚朝恩不惡輔國之禍以錢三十萬買之及朝恩將伏誅其香化為白蝶竟天而去當時議者以奇香異寶非人臣之所蓄也輔國家藏珍玩皆非人世所識夏則於堂中設迎凉之草其色𩔖碧而榦似苦竹葉細如杉雖若乾枯未嘗彫落盛暑束之牕户間而凉風自至鳳首木髙一尺彫刻鸞鳳之狀形似枯槁毛羽脫落不甚盡雖嚴凝之時置諸髙堂大厦之中而和煦之氣如二三月故列名為常春木縱烈火焚之終不燋黑焉凉草鳳木或出於薛王宅十洲記事火林有不焚之木殆非此𩔖者耶魚朝恩專權使氣公卿不敢仰視宰臣或決政事不預謀者則眦睚曰天下之事豈不由我乎於是上惡之而朝恩幼子曰令徽年十四五始給事於内殿上以朝恩故遂特賜禄焉未浹旬月同列黄門位居令徽上者因叙立於殿前恐其後至遂爭路以進無何誤觸令徽臂乃馳歸告朝恩以班次居下為同列所欺朝恩怒翌日於上前奏曰臣幼男令徽位處衆僚之下願陛下特賜金章以超其等不由緋便求紫上未及語而朝恩已令所司捧紫衣而至令徽即謝於殿前上雖知不可强謂朝恩曰卿兒著章服大宜稱也魚氏在朝動無畏憚他皆倣此其同列黄門尋遭斥遂於嶺表及朝恩被誅天下無不快焉上纂業之始多以庶務託於鈞衡而元載專政益墮國典若非良金重寶趑趄左道則不得出入於朝廷及常衮為相雖賄賂不行而介僻自專少於分别故升降多失其人或同列進擬稍繁則謂之沓伯由是京師語曰常無分别元好錢賢者愚而愚者賢時崔祐甫素公直與衆言曰朝廷上下相蒙善惡同致清曹峻府為鼠輩養資豈禆皇化耶由是益為持權者所忌至建中初祐甫執政人心方有所歸元載末年造蕓輝堂於私第蕓輝香草名也出于闐國其香潔白如玉入土不朽爛舂之為屑以塗其壁故號蕓輝焉而更構沉檀為梁棟飾金銀為户牖内設懸黎屏風紫綃帳其屏風本楊國忠之寶也屏上刻前代美女伎樂之形外以玳瑁水犀為押絡絡以真珠瑟瑟精巧之妙殆非人工所及紫綃帳得於南海溪洞之酋帥即鮫綃之𩔖也輕疎而薄如無所礙雖屬凝冬而風不能入盛夏則清凉自至其色𨼆𨼆焉忽不知其帳也謂載卧内有紫氣而服玩之奢僭擬於帝王之家蕓輝之前有池悉以文石砌其岸中有蘋陽花亦𩔖白蘋其花紅大如牡丹不知自何而來也更有碧芙蓉香潔菡萏偉於常者載因暇日憑欄以觀忽聞歌聲清響若十四五女子唱焉其曲則玉樹後庭花也載驚異莫知所在及審聽之乃芙蓉中也俯而視之聞喘息之音載惡之既甚遂剖其花一無所見即祕之不令人說及載受戮而逸奴為平盧軍卒人故得其實載有龍髯紫拂色如爛椹可長三尺削水精為柄刻紅玉為環鈕或風雨晦暝臨流沾濕則光彩動揺奮然如怒置之於堂中夜則蚊蚋不敢入拂之為聲雞犬牛馬無不驚逸若垂之池潭則鱗介之屬悉俯伏而至引水於空中則成瀑布三五尺未嘗輙斷燒燕肉燻之則㶿㶿焉若生雲霧厥後上知其異屢言之載不得已而遂進焉載自云得於洞庭道士張知和載寵姬薛瑤英攻詩書善歌舞􅋖姿玉質肌香體輕雖旋波搖光飛燕綠珠不能過也瑤英之母趙娟亦本岐王之愛妾也後出為薛氏之妻生瑤英而幼以香㗖之故肌香也及載納為姬處金絲之帳却塵之褥其褥出自勾驪國一云是却塵之獸毛所為也其色殷鮮光軟無比衣龍綃之衣一襲無一二兩摶之不盈一握載以瑤英體輕不勝重衣故於異國以求是服也唯賈至楊公南與載友善故往往得見歌舞至因贈詩曰舞怯銖衣重笑疑桃臉開方知漢武帝虚築避風臺王子年拾遗記趙飛燕體輕恐暴風帝為築臺焉公南亦作長歌褒美其略曰雪面蟾娥天上女鳳簫鸞翅欲飛去玉釵碧翠步無塵楚腰如栁不勝春瑶英善為巧媚載惑之怠於庶務而瑤英之父曰宗本兄曰從義與趙娟遞相出入以搆賄賂號為關節更與中書主吏卓倩等為腹心而宗本輩以事告者載未嘗不頷之天下賫寶貨求大官職無不恃載權勢指薛卓為梯媒及載死瑤英自為俚妻矣論者以元載䘮令德而崇貪名自一婦人而致也傳於進士賈遂德宗皇帝英明果斷無以比德每進用公卿大臣莫不出自宸衷若聞一善可録未嘗不稱奬之百官對敭如稍稱㫖無不擡眉聳聽朝退即輙書其姓名於座側或有奬用多所稱職故卿大夫已下謂上聖英睿每與宰臣從容詢訪時政往往呼其行第其尚賢進善皆此𩔖也及上蒙塵幸奉天翰林學士姜公輔屢進嘉謀深叶上意初涇原兵亂長安公輔奏云朱泚甚有反狀不如早為之所無令為兇逆也上倉皇之際不暇聽從更云朱泚素鎮涇原頗得將士心今罷兵權居常悒悒不如詔之以從鑾駕不然即斬之以絶後患及聞段秀實之死上執公輔手曰姜公姜公先見之明可謂神略矣盧杞朕擢自郡守坐於廟堂自陳百口之說何獨悞我也盧杞常言以百口保朱泚不反上將欲幸奉天自攜火精劍出内殿因嘆曰千萬年社稷豈為狗鼠所竊耶遂以劍斫檻上鐵狻猊應手而碎左右皆呼萬歲上曰若碎小冦如斬狻猊不足憂也及乘輿遇夜侍從皆見上仗數尺光明即火精劍也建中二年大林國所貢云其國有山方數百里出神鐵其山有瘴毒不可輕為採取若中國之君有道神鐵即自流溢鍊之為劍必多靈異其劍之光如電切金玉如泥以朽木磨之則生煙焰以金石撃之則火光流起上始於行在無藥餌以備將士金瘡時有禆將為流矢所中上碎琥珀匣以賜之其匣則火精劍匣也近臣諫曰陛下奈何以禆將金瘡而碎琥珀匣上曰今兇奴逆恣欲危社稷是軍中藉材用人之際而戰士有瘡如朕身之瘡也昔太宗剪􅂡以付英公今朕以人為寶豈以劍匣為寶也左右及中外聞者無不感恱初上欲西行有知星者奏上曰逢林即住上曰豈可令朕處林木間乎姜公輔曰不然但以地名亦應也及奉天尉賈𨼆林謁上於行在上觀𨼆林氣宇雄俊兼是忠烈之家而名叶知星者語𨼆林即天寶末賈循之猶子也上因延於卧内以採籌略之深淺𨼆林於獅榻前以手板畫地陳攻守之策上甚異之𨼆林因奏曰臣昨夜夢日墜地臣以頭戴日上天上曰日即朕也此來事莫非前定遂拜為侍御史糾劾行在尋遷左常侍後駕遷幸梁州而𨼆林卒二年夏五月京師副元帥李晟收復宫闕朱泚走涇原而兵士纔餘數百人昏忽迷路不辨南北因問路於田父田父對曰豈非朱太尉耶偽宰相源休止之曰漢皇帝泚偽號漢田父曰天不長兇地不生惡蛇不為龍鼠不為虎天網恢恢去將何適泚怒將殺之忽亡其所在及去涇州百餘里泚忽馬上叩頭稱乞命而手足紛紜若有拒捍因之墜馬良久復蘇左右扶上馬問其故泚曰見段司農劉海賓杖戈執㦸與朕相敵不堪其苦也時將士聞者益懷異意翌日達涇州偽節度使田希鑒閉門不納遂至寧州彭原縣為心腹衞士韓旻薛綸朱維孝等逼而墜穽將殺之泚謂旻曰汝等朕所鍾愛今將敗績何忍共殺耶旻曰誠為陛下腹心失則不可共為塗炭今借陛下之首以取富貴也言未終泚首已斷泚始亂長安源休姚令言等廣陳圖䜟以堅泚意及為偽宰相日益自負休乃收圖書貯倉廩作蕭何事業或聞王師不利而喜色出面謂令言曰天下將定吾等之功豈後於蕭何矣令言曰漢皇未弱於劉季休退語偽黄門侍郎蔣諫曰若度其才即吾為蕭姚為曹耳識者聞之謂休不柰官職喬琳雖受偽官而性好諧戲因語舊僚曰源公真所謂火迫酇侯耳代宗朝異國所獻奇禽馴獸自上即位多放棄之建中二年南方貢朱來鳥形有𩔖於戴勝而紅觜紺尾尾長於身巧解人語善别人意其音清響聞于庭外數百步宫中多所憐愛常為玉屑和香稻以㗖之則其聲益加寥亮夜則棲於金籠晝則飛翔於庭廡而俊鷹大鶻不敢近一日為巨鵰所搏而斃宫中無不歔欷或遇其籠自開内人有善書者於金華紙上為朱來鳥寫多心經及朱泚犯禁闈朱來鳥之兆明矣又大厯中澤潞有僧號普滿隨意所為不拘僧相或歌或哭莫喻其㫖以言事往往有驗故時人比為萬廻建中初於潞州佛舍中題詩數篇而亡去所記者云此水連涇水雙珠血滿川青牛將赤虎還號太平年此水者泚字涇水者自涇州兵亂雙珠者泚與弟滔青牛者興元二年乙丒嵗乙木也丑牛也是歲改貞元元年丙火寅虎也是歲賊平故也上切於時政而頗倚注于台衮之臣每命相宻召學士草詔及進本上輙多改注即顧謂左右曰朕處渠等極位復以美詞褒之所冀為朕戮力同心以成大化既用崔祐甫為相悉以國務委之而祐甫事無巨細悉皆陳諫上曰朕與卿道合天下細事卿宜隨便剖奏無乃多疑朕也自是祐甫之道益為公當及楊公南盧杞執政報恩復讎紊亂綱紀朝野為之戢手公南既殺劉晏士庶莫不寃痛之明年公南得罪賜死崖州時人謂劉相公寃報矣建中元年七月乙丑楊殺晏二年十月乙未貶楊為崖州司户去州百里賜死實録云七月庚午晏已受誅使廻云至乙丑下詔殺之上每臨朝多令徴四方丘園才能學術直言極諫之士由是提筆貢藝者滿於闕下上親自考試用絶請託之門是時文學相髙公道大振得路者咸以推賢進善為意上試制科於宣政殿或有詞理乖謬者即濃筆抹之至尾如輙稱㫖者必翹足朗吟翌日則徧示宰臣學士曰此皆朕門生也是以公卿大臣已下無不服上藻鑑宏詞獨孤受所司試放馴象賦及進其本上自覽考之稱嘆者久因吟其句曰化之式孚則必受乎來獻物或違性斯用感於至仁上以受為知去就故特書第三等先是代宗朝文單國累進馴象三十有二上即位悉令放之於荆山之南而受不辱其受獻不傷放棄故賞其知去就焉貞元三年中常侍自蜀使迴進瑞鞭一其文節髙有麟鳳龜龍之形體質㣲而鱗甲毛羽無不備具其色照爛有𩔖琥珀於暗中揮之則如電光上雖不好寶貨祥瑞及覽此鞭頗甚稱㫖稱嘆遂置之于明珠匣其匣蓋飾以明珠者也上西幸有二馬一號神智驄一號如意騮皆耳中有毛引之可長一尺相馬經云耳中有毛長一尺者日行千里而進退緩急皆如上意故以是名之一日花木方春上欲幸諸苑内廏控馬侍者進瑞鞭上指二駿語近臣曰昔朕西幸有二駿謂之二絶今獲此鞭可謂三絶矣遂命酒飲之左右引翼而去因吟曰鴛鴦赭白齒新齊晚日花閒落碧蹄玉勒乍迴初噴沫金鞭欲下不成嘶中書舍人韓翃詩也八年吳明國洞冥記有吳明之瓏貢常燃鼎鸞蜂􅁡云其國去東海數萬里經挹婁沃沮等國挹婁沃沮皆出漢東夷傳其土宜五榖珍玉尤多禮樂仁義無剽刼人夀二百歲俗尚神􅋖術而一歲之内乘雲控鶴者往往有之常望有黄氣如車蓋知中國有土德王遂願入貢焉常燃鼎量容三斗光潔𩔖玉其色純紫每修飲􅄿不熾火而俄頃自熟香潔異於常等久食之令人反老為少百疾不生鸞蜂􅁡云其蜂之聲有如鸞鳳而身被五彩大者可重十餘斤為窠於深巖峻嶺間大者占地二三畝國人採其􅁡不過三二合如過度則有風雷之異若悞螫人則生瘡以石上菖蒲根傅之即愈其􅁡色碧常貯之於白玉椀表裏瑩徹如碧琉璃久食之令人長夀顏如童子髮白者應時而黑及沉疴眇跛諸僻惡之病無不療焉杜陽雜編卷上
