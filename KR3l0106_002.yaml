body:
  text: 杜陽雜編卷中唐蘇鶚撰順宗皇帝即位歲拘弭國貢却火雀一雄一雌履水珠常堅冰變晝草其却火雀純黑大小似燕其聲清殆不類尋常禽鳥置於火中火自散去上嘉其異遂盛於水精籠懸於寢殿夜則宫人持蠟炬以燒之終不能損其毛羽履水珠色黑類鐵大於雞卵其上鱗皴其中有竅云持入江海內可行於洪波之上下上始不謂之實遂命善浮者以五色絲貫之繫於左臂毒龍畏五色絲遣入龍池其人則步驟於波上若在平地亦潛於水中良久復出而遍體略無霑濕上奇之因以御饌賜使人至長慶中嬪御試弄於海池上遂化為黑龍入于池內俄而雲煙暴起不復追討矣常堅冰云其國有大凝山中有冰千年不釋及賫至亰師潔冷如故雖盛暑赭日終不消嚼之即與中國者無異變晝草有類芭蕉可長三尺而一莖千葉樹之則百步內昏黑如夜始藏於百寶匣中其上緘以胡書上見而怒曰背明向暗之物是何貴也遂命并匣焚之於使前使初不為樂及退謂鴻臚曰本國以變晝為異今皇帝以向暗為非可謂明德也永貞元年南海貢奇女盧眉娘年十四眉娘生而眉如線細長也稱本北祖帝師之裔自大足中流落於嶺表後漢盧景祚景裕景宣景融兄弟四人皆為帝師因號為帝師也幼而慧悟工巧無比能於一尺絹上繡法華經七卷字之大小不逾粟粒而點畫分明細於毛髮其品題章句無有遺闕更善作飛仙蓋以絲一縷分為三縷染成五彩於掌中結為傘蓋五重其中有十洲三島天人玉女臺殿麟鳳之象而外列執幢捧節之童亦不啻千數其蓋濶一丈稱之無三數兩自煎靈香膏傅之則虬硬不斷上歎其工謂之神助因令止於宫中每日但食胡麻飯二三合至元和中憲宗皇帝嘉其聰慧而奇巧遂賜金鳳環以束其腕知眉娘不願住禁中遂度以黃冠放歸南海仍賜號曰逍遙及後神遷香氣滿室弟子將葬舉棺覺輕即徹其蓋惟有藕屨而已後入海人往往見乘紫雲遊於海上是時羅浮處士李象先作盧逍遙傳而象先之名無聞故不為世人傳焉憲宗皇帝寬仁大度不妄喜怒及便殿與宰臣言政事莫不嚴肅容貌是以進善出惡俗泰刑清而天下風化矣或延英入閣未嘗不以生民哀樂為意或四方進歌舞妓樂上皆不納則謂左右曰六宫之內嬪御已多一旬之中資費盈萬豈可剝膚捶髓強娛耳目焉其儉德憂人皆此類也吳元濟之亂淮西以宰臣裴度為元帥及對於殿上曰偽蔡稱兵朕於擇帥甚難其人也且安天下用將帥如造大舟以越滄海其功則多其成則大一日萬里無所不屆若乘一葉而蹈洪波其功也寡其覆也速朕今託元老以摧狂冦真謂一日萬里矣度曰微臣無狀叨蒙大用唯慮一丸之卵不足以勝太山欵段之馬不足以行千里但竭臣至忠以仗宗廟之靈臣雖不才敢以死效命泣下沾濡若不勝語上亦為之動容元和五年內給事張惟則自新羅使回云於海上泊洲島間忽聞雞犬鳴吠似有煙火遂乘月間步約及一二里則見花木臺殿金户銀闕其中有數公子戴章甫冠著紫霞衣吟嘯自若惟則知其異遂請謁見公子曰汝何所從來惟則具言其故公子曰唐皇帝乃吾友也汝當旋去為吾傳語俄而命一青衣捧金龜印以授惟則乃置之於寶函復謂惟則曰致意皇帝惟則遂持之還舟中回顧舊路悉無蹤迹金龜印長五寸上負黃金玉印面方一寸八分其曰鳳芝龍木受命無疆惟則達京師即具以事進上曰朕前生豈非仙人乎及覽龜印歎異良久但不能諭其文爾因命緘以紫泥玉鎖致於帳內其上往往見五色光可長數尺是月寢殿前連理樹上生靈芝二株宛如龍鳳上因歎曰鳳芝龍木寧非此驗乎上好神􅋖不死之術而方士田佐元僧大通皆令入宫禁以鍊石為名時有處士伊祁玄解縝髮童顏氣息香潔常乘一黃牝馬才髙三尺不啖芻粟但飲醇酎不施韁勒唯以青氊藉其背常遊歷青兖間若與人欵曲語話千百年事皆如目擊上知其異人遂令密召入宫處九華之室設紫茭之席飲龍膏之酒紫茭席色紫而類茭葉光軟香淨冬溫夏涼龍膏酒黑如純漆飲之令人神爽此本烏弋山離國所獻烏弋山離國見班固西域傳上每日親自訪問頗加敬仰而玄解魯朴未嘗間人臣禮上因問曰先生春秋既髙而顏色不老何也玄解曰臣家于海上常種靈草食之故得然也即於衣間出三等藥實為上種於殿前一曰雙麟芝二曰六合葵三曰萬根藤雙麟芝色褐一莖兩穗隱隱形如麟頭尾悉具其中有子如瑟瑟焉六合葵色紅而葉類於茙葵始生六莖其上合為一株共生十二葉內出二十四花花如桃花而一朵千葉一葉六影其成實如相思子萬根藤一子而生萬根枝葉皆碧鈎連盤屈可蔭一畝其花鮮潔狀類芍藥而蘂色殷紅細如絲髮可長五六寸一朵之內不啻千莖亦謂之絳心藤靈草既成人莫得見玄解請上自采餌之頗覺神驗由是益加禮重遇西域有進美玉者二亡其國名一圓一方徑各五寸光彩凝冷可鑑毛髮時玄解方坐於上前熟視之曰此一龍玉也一虎玉也上驚而問曰何謂龍玉虎玉耶玄解曰圓者龍也生於水中為龍所寶若投之水必虹霓出焉方者虎也生於嵓谷為虎所寶若以虎毛拂之即紫光迸逸而百獸懾服上異其言遂令試之各如其説詢得玉之由使人曰一自漁者得一自獵者獲上因命取龍虎二玉以錦囊盛之於內府玄解將還東海亟請於上上未之許過宫中刻木作海上三山綵繪華麗間以珠玉上因元日與玄解觀之指蓬萊曰若非上􅋖無由得及此境玄解笑曰三島咫尺誰曰難及臣雖無能試為陛下一遊以探物象妍醜即踴體於空中漸覺微小俄而入於金銀闕內左右連聲呼之竟不復有所見上追思歎恨僅成羸疹因號其山為藏真島每詰旦於島前焚鳳腦香以崇禮敬後旬日青州奏云玄解乘黃牝馬過海矣八年大軫國貢重明枕神錦衾碧麥紫米云其國在海東南三萬里當軫宿之位故曰大軫國經合丘禺稿之山合丘禺稿山見山海經重明枕長一尺二寸髙六寸潔白逾於水精中有樓臺之狀四方有十道士持香執簡循環無已謂之行道真人其樓臺瓦木丹青真人衣服簪帔無不悉具通瑩焉如水覩物神錦衾水蠶絲所織也方二丈厚一寸其上龍文鳳彩殆非人工其國以五色彩石甃池塘採大柘葉飼蠶於池中始生如蚊睫遊泳於其間及老可五六寸池中有挺荷雖驚風疾吹不能傾動大者可濶三四尺而蠶經十五月即跳入荷中以成其繭形如斗自然五色國人繅之以織神錦亦謂之靈泉絲上始覽錦衾與嬪御大笑曰此不足以為嬰兒綳褯曷能為我被耶使者曰此錦之絲水蠶也得水則舒水火相反遇火則縮遂於上前令四官張之以水一噴即方二丈五色煥爛逾於向時上乃歎曰本乎天者親上本乎地者親下不亦然哉則却令以火逼之須臾如故上益異之翌日出示術士田元佐李元戢焉碧麥大於中華之麥粒表裏皆碧香氣如粳米食之體輕久則可以御風紫米有類苣蕂炊一升得飯一斗食之令人髭髮縝黑顏色不老久則後天不死上因中元日薦于玄元皇帝故當時道士有得食者得於太清宫道士朱環中穆宗皇帝殿前種千葉牡丹花始開香氣襲人一朵千葉大而且紅上每覩芳盛嘆曰人間未有自是宫中每夜即有黃白蛺蝶萬數飛集于花間輝光照耀達曉方去宫人競以羅巾撲之無有獲者上令張網於空中遂得數百於殿內縱嬪御追捉以為娛樂遲明視之則皆金玉也其狀工巧無以為比而內人爭用絳縷絆其腳以為首飾夜則光起粧奩中其後開寶厨覩金錢玉屑之內將有化為蝶者宫中方覺焉飛龍衛士韓志和本倭國人也善雕木作鸞鶴鴉鵲之狀飲啄動靜與真無異以關戾置於腹內發之則凌雲奮飛可髙三尺至一二百步外方始却下兼刻木作貓兒以捕鼠雀飛龍使異其機巧遂以事奏上覩而恱之志和更雕踏牀髙數尺其上飾之以金銀綵繪謂之見龍牀置之則不見龍形踏之則鱗鬛爪牙俱出及始進上以足履之而龍天矯若得雲雨上怖畏遂令撤去志和伏於上前曰臣愚昧致有驚忤聖躬臣願别進薄伎稍娛至尊耳目以贖死罪上笑曰所解伎何試為我作之志和遂於懷中出一桐木合子方數寸中有物名蠅虎子數不啻一二百焉其形皆赤云以丹砂啖之故也乃分為五隊令舞涼州上令召樂以舉其曲而虎子盤回宛轉無不中節每遇致詞處則隱隱如蠅聲及曲終纍纍而退若有尊卑等級志和臂虎子令於上前獵蠅於數百步之內如鷂捕雀罕有不獲者上嘉其小有可觀即賜以雜綵銀碗志和出宫門悉轉施於他人不逾年竟不知志和之所在敬宗皇帝寶厯元年南昌國獻玳瑁盆浮光裘夜明犀其國有酒山紫海蓋山有泉其味如酒飲之甚美醉則經月不醒紫海水色如爛椹可以染衣其龍魚龜鱉砂石草木無不紫焉玳瑁盆可容十斛外以金玉飾之及盛夏上置於殿內貯水令滿遣嬪御持金銀杓酌水相沃以為嬉戲終不竭焉浮光裘即海水染其色也以五綵蹙成龍鳳各一千三百絡以九色真珠上衣之以獵北苑為朝日所照而光彩動搖觀者皆昡其目上亦不為之貴一日馳馬從禽忽值暴雨而浮光裘略無沾潤上方嘆為異物也夜明犀其狀類通天夜則光明可照百步覆繒千重終不能掩其輝煥上令解為腰帶每遊獵夜則不施蠟炬有如晝日寶厯二年浙東國貢舞女二人一曰飛鸞二曰輕鳳修眉黟首蘭氣融冶冬不纊衣夏不汗體所食多荔枝棐實金屑龍腦之類衣軿羅之衣戴輕金之冠表異國所貢也軿羅衣無縫而成其紋巧織人未之識焉輕金冠以金絲結之為鸞鶴狀仍飾以五彩細珠玲瓏相續可髙一尺稱之無二三分上更琢玉芙蓉以為二女歌舞臺每歌聲一發如鸞鳳之音百鳥莫不翔集其上及觀於庭際舞態艷逸更非人間所有每歌罷上令內人藏之金屋寶帳蓋恐風日所侵故也由是宫中語曰寶帳香重重一雙紅芙蓉上降日大張音樂集天下百戲於殿前時有妓女石火胡本幽州人也挈養女五人才八九歲於百尺竿上張弓絃五條令五女各居一條之上衣五色衣執戟持戈舞破陳樂曲俯仰來去赴節如飛是時觀者目眩心怯火胡立於十重朱畫牀子上令諸女迭踏以至半空手中皆執五綵小幟牀子大者始一尺餘俄而手足齊舉為之踏渾脫歌呼抑揚若履平地上賜物甚厚文宗即位惡其太險傷神遂不復作文宗皇帝尚賢樂善罕有倫比每與宰臣學士論政事之暇未嘗不話才術文學之士故當時以文進者無不諤諤焉於是上每視朝後即閲羣書見無道之君行狀則必扼腕歔欷讀堯舜禹湯傳則歡呼斂袵謂左右曰若不甲夜視事乙夜觀書何以為人君耶每試進士及諸科舉人上多自出題目及所司進所試而披覽吟誦終日忘倦常延學士於內廷討論經義較量文章令宫女已下侍茶湯飲饌而李訓講周易微義頗叶於上意時方盛夏遂命取水玉腰帶及辟暑犀如意以賜訓訓謝之上曰如意足以與卿為談柄也上讀髙郢無聲樂賦白居易求玄珠賦謂之玄祖傳於水部賈嵩員外大和九年誅王涯鄭注後仇士良專權恣意上頗惡之或登臨遊幸雖百戲駢羅未嘗為樂往往瞪目獨語左右莫敢進問因題詩曰輦路生春草上林花滿枝憑髙何限意無復侍臣知上於內殿前看牡丹翹足憑欄忽吟舒元輿牡丹賦云俯者如愁仰者如語合者如咽吟罷方省元輿詞不覺嘆息良久泣下沾臆時有宫人沈阿翹為上舞河滿子調聲風態率皆宛暢曲罷上賜金臂環即問其從來阿翹曰妾本吳元濟之妓女濟敗因以聲得為宫人俄遂進白玉方響云本吳元濟所與也光明皎潔可照十數步言其犀槌即響犀也凡物有聲乃響應其中焉架則雲檀香也而文彩若雲霞之狀芬馥著人則彌月不散制度精妙固非中國所有上因令阿翹奏涼州曲音韻清越聽者無不凄然上謂之天上樂乃選內人與阿翹為弟子焉開成初宫中有黃色蛇夜自寶庫中出遊於階庭間光彩照灼不可擒捕宫人擲珊瑚玦擊之遂并玦而亡去掌庫者具以事告上令遍搜庫內乃得黃金蛇而珊瑚玦著其首上熟視之曰昔隋煬帝為晉王時以黃金蛇贈陳夫人吾不知此蛇得自何處左右因覩頷下有嬤字上蹶然曰果不失朕所疑耳阿嬤煬帝小字也上之博學敏悟率多此類遂命取頗黎連環繫於玉彘之前足其後更不復見焉以彘能啖蛇也上好食蛤蜊一日左右方盈盤而進中有擘之不裂者上疑其異乃焚香祝之俄頃自開中有二人形眉端秀體質悉備螺髻瓔珞足履菡萏謂之菩薩上遂置之於金粟檀香合以玉屑覆之賜興善寺令致敬禮至會昌中毁佛舍遂不知所在傳之涇州從事陳訥王涯初為大官名德聞望頗為朝廷欽仰末年恃寵固位為士大夫譏之其所居之地妖怪屢見知氣者以不吉語告之而涯廣自引諭曽無休退之意及伏誅時人謂王公禍至不省惑矣鄭注艱險左道熒惑人主為天下側目鄭鎮鳳翔日有草如茵生於紫金帶上注既心有所圖乃喜謂芝瑞識者以物反其所夫草生於土常也今生於金是反常也鄭氏之禍將至其不久矣注又嘗置藥篋藥化為青蠅萬數飛去注頗惡之數日不視事未踰月而誅焉賈餗布衣時謁滑臺節度使賈耽耽以餗宗黨復喜其文才宏麗由是延納之忽一日賓客大會有善相者在耽座中及餗退而相者謂曰向來賈公子神氣俊逸當位極人臣然當執政之時朝廷微變若當此際諸公宜早避焉耽頷之以至動容及大和初餗秉鈞衡有知者潛匿於山谷間十有三四耳王沐者涯之再從弟也家於江南老而且窮以涯執相權遂跨蹇驢至京師索米僦舍經三十餘月始得一見涯於門屏所望不過一簿尉耳涯潦倒無鴈序之情大和九年秋沐方説涯之嬖奴以導所欲涯始一召見欵曲而許微官處焉自是旦夕造涯之門以俟其命及涯敗露伏法仇士良收王氏家族沐方在涯私第以為族人被執而腰斬之舒守謙即元輿之族也聰敏慧悟富有春秋元輿以源流非逺而禮遇頗厚經歲處元輿舍未嘗一日間怠于車服飲饌元輿謂之猶子薦取明經第官歷祕書郎及持相印許列清曹命之無何末年以非過怒守謙至于朔旦伏謁頓不相見由是日加譴責亦為童僕輩白眼守謙既不自安遂置書于門下辭往江南元輿亦不見問翌日辦裝出長安咨嗟蹇分怊悵自失即駐馬回望泣涕漣洳始達昭應忽聞元輿之禍釋然驚喜是時於宰相宅收捕家口不問親踈並從誅戮當時論者以王舒禍福之異有定分焉杜陽雜編卷中
